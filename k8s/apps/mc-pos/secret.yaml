apiVersion: v1
kind: Secret
metadata:
  name: pos-secrets
  namespace: mc-pos
type: Opaque
stringData:
  DATABASE_URL: "postgresql://pos_user:change-this-password@pos-postgres.mc-pos.svc.cluster.local:5432/pos_db?schema=public"
  JWT_SECRET: "change-this-jwt-secret"
  JWT_REFRESH_SECRET: "change-this-refresh-secret"
  JWT_EXPIRES_IN: "1h"
  JWT_REFRESH_EXPIRES_IN: "7d"
  POSTGRES_DB: "pos_db"
  POSTGRES_USER: "pos_user"
  POSTGRES_PASSWORD: "change-this-password"
