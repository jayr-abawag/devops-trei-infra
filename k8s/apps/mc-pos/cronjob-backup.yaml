apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: mc-pos
spec:
  schedule: "0 2 * * *"  # Run daily at 2 AM
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    metadata:
      labels:
        app: postgres-backup
    spec:
      template:
        metadata:
          labels:
            app: postgres-backup
        spec:
          restartPolicy: OnFailure
          containers:
          - name: backup
            image: postgres:16-alpine
            command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Starting PostgreSQL backup at $(date)"

              # Backup filename with timestamp
              BACKUP_FILE="/backup/backup-$(date +%Y%m%d-%H%M%S).sql"

              # Perform backup
              echo "Creating backup: $BACKUP_FILE"
              PGPASSWORD="$POSTGRES_PASSWORD" pg_dump -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB" --clean --if-exists > "$BACKUP_FILE"

              # Compress backup
              echo "Compressing backup..."
              gzip "$BACKUP_FILE"
              BACKUP_FILE="${BACKUP_FILE}.gz"

              # Get file size
              SIZE=$(du -h "$BACKUP_FILE" | cut -f1)

              echo "Backup completed: $BACKUP_FILE ($SIZE)"

              # Clean up old backups (keep last 30 days)
              echo "Cleaning up old backups..."
              find /backup -name "backup-*.sql.gz" -type f -mtime +30 -delete

              # List current backups
              echo "Current backups:"
              ls -lh /backup/
            env:
            - name: POSTGRES_HOST
              value: "pos-postgres"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pos-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pos-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: pos-secrets
                  key: POSTGRES_DB
            volumeMounts:
            - name: backup-storage
              mountPath: /backup
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: postgres-backup-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
  namespace: mc-pos
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: local-storage
