apiVersion: v1
kind: Service
metadata:
  name: pos-backend
  namespace: mc-pos
  labels:
    app: pos-backend
spec:
  type: NodePort
  selector:
    app: pos-backend
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      nodePort: 30301
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pos-backend
  namespace: mc-pos
  labels:
    app: pos-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pos-backend
  template:
    metadata:
      labels:
        app: pos-backend
      annotations:
        # ArgoCD Image Updater annotations
        argocd-image-updater.argoproj.io/image-list: jayr-abawag/p2-pos-backend=ghcr.io/jayr-abawag/p2-pos-backend:latest
        argocd-image-updater.argoproj.io/jayr-abawag/p2-pos-backend.update-strategy: latest
        argocd-image-updater.argoproj.io/jayr-abawag/p2-pos-backend.force-update: "true"
    spec:
      containers:
        - name: pos-backend
          image: ghcr.io/jayr-abawag/p2-pos-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: pos-backend-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pos-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pos-secrets
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: pos-secrets
                  key: JWT_REFRESH_SECRET
            - name: JWT_EXPIRES_IN
              valueFrom:
                secretKeyRef:
                  name: pos-secrets
                  key: JWT_EXPIRES_IN
            - name: JWT_REFRESH_EXPIRES_IN
              valueFrom:
                secretKeyRef:
                  name: pos-secrets
                  key: JWT_REFRESH_EXPIRES_IN
          readinessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 10
