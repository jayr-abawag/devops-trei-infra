apiVersion: v1
kind: Service
metadata:
  name: mc-water
  namespace: mc-water
  labels:
    app: mc-water
spec:
  type: ClusterIP
  selector:
    app: mc-water
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mc-water
  namespace: mc-water
  labels:
    app: mc-water
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mc-water
  template:
    metadata:
      labels:
        app: mc-water
      annotations:
        # ArgoCD Image Updater annotations
        argocd-image-updater.argoproj.io/image-list: jayr-abawag/mc-water-v1=ghcr.io/jayr-abawag/mc-water-v1:latest
        argocd-image-updater.argoproj.io/jayr-abawag/mc-water-v1.update-strategy: latest
        argocd-image-updater.argoproj.io/jayr-abawag/mc-water-v1.force-update: "true"
    spec:
      containers:
        - name: mc-water
          image: ghcr.io/jayr-abawag/mc-water-v1:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
