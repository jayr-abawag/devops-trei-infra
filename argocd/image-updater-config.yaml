# ArgoCD Image Updater Configuration
# This configuration enables automatic image tag updates when new images are pushed to GHCR

apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-config
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater
data:
  # Log level
  log.level: debug

  # ArgoCD server connection
  argocd.server.address: argocd-server.argocd.svc.cluster.local

  # Git commit configuration
  git.commit.message: |
    ci: update image {{.AppName}} to {{.ImageID}}

    Image: {{.ImageID}}
    Author: {{.Author}}
    Date: {{.Timestamp}}

  # Image update strategies
  image-list: >-
    jayr-abawag/p2-pos-backend:ghcr.io/jayr-abawag/p2-pos-backend,
    jayr-abawag/p2-pos-frontend:ghcr.io/jayr-abawag/p2-pos-frontend,
    jayr-abawag/mc-water-v1:ghcr.io/jayr-abawag/mc-water-v1

  # Update policy
  update.strategy: latest
  git.author: "ArgoCD Image Updater <argocd-image-updater@localhost>"
  git.commit-user: "argocd-image-updater"
  git.commit-email: "argocd-image-updater@localhost"

  # Kubernetes secrets for git authentication
  git.credentials: |
    - sshPrivateKeySecret:
        name: argocd-image-updater-git-creds
        key: sshPrivateKey
      url: git@github.com:jayr-abawag/devops-trei-infra.git

---
# Deployment for ArgoCD Image Updater
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-image-updater
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-image-updater
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-image-updater
    spec:
      containers:
      - name: argocd-image-updater
        image: quay.io/argoprojlabs/argocd-image-updater:v0.12.2
        imagePullPolicy: Always
        env:
        - name: LOG_LEVEL
          value: "debug"
        volumeMounts:
        - name: git-creds
          mountPath: /app/git-creds
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      - name: git-creds
        secret:
          secretName: argocd-image-updater-git-creds
          optional: true
