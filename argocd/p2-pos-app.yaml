# ArgoCD Application for P2-POS
# This defines how ArgoCD should deploy and sync the P2-POS application

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: p2-pos
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # Project this application belongs to
  project: p2-pos

  # Source configuration
  source:
    # Infrastructure repository (where K8s manifests live)
    repoURL: https://github.com/jayr-abawag/devops-trei-infra.git
    targetRevision: main
    path: k8s/apps/mc-pos
    # Kustomize for image tag updates
    kustomize:
      # Allow ArgoCD to update image tags
      images:
        - name: jayr-abawag/p2-pos-backend
          newName: ghcr.io/jayr-abawag/p2-pos-backend
        - name: jayr-abawag/p2-pos-frontend
          newName: ghcr.io/jayr-abawag/p2-pos-frontend

  # Destination cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: mc-pos

  # Sync policy
  syncPolicy:
    automated:
      # Auto-sync when changes are detected
      selfHeal: true
      # Auto-prune resources
      prune: true
      # Allow empty commits to trigger sync
      allowEmpty: false
    # Sync options
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true

  # Ignore differences (allow manual scaling)
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/clusterIP
        - /spec/clusterIPs

  # Health checks
  healthCheck:
    # Number of seconds to wait before attempting health check
    timeout: 300
